# .github/workflows/ci.yml
# CI for image-transformer — Pragmatic Tier refactor
#
# Phase 0 (current): python_tests job is active; others are skeletons.
# Phase 1:  uncomment rust_core job.
# Phase 2:  uncomment wasm_build job.
# Phase 3:  uncomment ts_typecheck job.
#
# The python_tests job deliberately does NOT fetch external URLs during CI
# (Unsplash may rate-limit). Network-dependent tests are skipped via pytest.mark.skipif.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# ─── Python tests (active from Phase 0) ─────────────────────────────────────
jobs:
  python_tests:
    name: Python tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest Pillow requests openpyxl jsonschema

      - name: Run tests
        run: pytest tests/test_parity.py -v --tb=short
        # Note: TestRustPythonParity is @pytest.mark.skip so it won't fail CI.
        # TestPresetSchema and TestPythonPipelineSmoke run fully.

