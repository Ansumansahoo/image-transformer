# .github/workflows/ci.yml
# CI for image-transformer — Pragmatic Tier refactor
#
# Phase 0: python_tests job active.
# Phase 1: rust_core job ACTIVE.
# Phase 2: wasm_build — uncomment when Phase 2 begins.
# Phase 3: ts_typecheck — uncomment when Phase 3 begins.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Python tests
  python_tests:
    name: Python tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests openpyxl Pillow jsonschema
      - name: Run Python tests
        run: pytest tests/ -v --tb=short

  # Rust core (Phase 1)
  rust_core:
    name: Rust core build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-
      - name: Build debug
        working-directory: core-rs
        run: cargo build --all-features
      - name: Run Rust tests
        working-directory: core-rs
        run: cargo test --all-features -- --test-output immediate
      - name: Build release
        working-directory: core-rs
        run: cargo build --release --features cli
